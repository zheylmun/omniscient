# Copy to omniscient.toml in your repo root and edit.
languages = ["rust", "python", "typescript"]
strip_comments = true

# Dependency lock files (Cargo.lock, package-lock.json, yarn.lock, pnpm-lock.yaml,
# poetry.lock, go.sum, ...) are ALWAYS skipped — large, generated, pure noise.
# This is not affected by index_tests below.

# Test/fixture files (tests/, benches/, **/*.test.*, **/*.spec.*, **/*_test.*,
# **/test_*.py, **/conftest.py, **/__tests__/) are skipped by default. Set true
# to index them too.
index_tests = false

# Extra glob patterns to skip when indexing, in addition to the built-in lock-file
# and test excludes above. Matched against repo-relative paths. .gitignore is always honored.
exclude = []   # e.g. ["vendor/**", "**/*.generated.rs"]

[embedder]
base_url = "http://localhost:8080"   # local llama.cpp serving an embedding model
model = "qwen3-embedding-4b"
# Embedding requests are split into batches so a massive file can't overload the
# GPU. A batch is flushed before it would exceed either bound (a single chunk
# larger than max_batch_bytes is sent on its own). When auto_start launches the
# server, max_batch_bytes also sizes its --ctx-size/--batch-size/--ubatch-size so
# it can hold the largest request we send (llama.cpp's tiny defaults would make it
# accept the startup probe and then crash on the first real batch).
max_batch_chunks = 64       # max chunks per embed request
max_batch_bytes = 32000     # max total bytes per embed request (~8k tokens)

# Auto-start: when true and base_url is unreachable, omniscient launches llama.cpp
# itself (`llama serve -hf <hf_repo> --port <port> --embedding --pooling <pooling>`)
# and kills it on exit. Off by default; an already-running endpoint is reused as-is.
# Only manages a LOCAL server (a remote base_url is an error). Requires the unified
# `llama` CLI on PATH (or set llama_bin to its absolute path).
auto_start = false
llama_bin = "llama"                                 # llama.cpp CLI binary
hf_repo = "Qwen/Qwen3-Embedding-4B-GGUF:Q4_K_M"     # GGUF repo[:quant], downloaded on first run
pooling = "last"                                    # last = Qwen3-Embedding; mean = BERT-family
auto_start_timeout_secs = 600                       # max seconds to wait for readiness

[search]
# Results are selected by the *shape* of the relevance scores, not a fixed count:
# every hit scoring at least relevance_ratio of the top hit is returned (so a sharp
# query yields few results, a broad one yields many). max_results is a safety ceiling
# and token_budget a hard cap; the single best match is always returned.
relevance_ratio = 0.75   # keep hits within 75% of the top hit's score
max_results = 25         # ceiling on candidates fetched + results returned
token_budget = 4000

[watch]
enabled = true      # set false to disable the filesystem watcher
debounce_ms = 200   # coalesce bursts of FS events into one reconcile
